name: Publish CLI to NuGet

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack CLI
        run: dotnet pack src/ToggleMesh.CLI/ToggleMesh.CLI.csproj -c Release -o ./artifacts

      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: sdwcktarakanov

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
