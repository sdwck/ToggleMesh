# docker-compose.dev.yml
# For local development only — spins up infrastructure services.
# Run the API and Admin UI separately via `dotnet run` and `npm run dev`.
#
# Usage: docker-compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:17
    container_name: togglemesh-dev-db
    environment:
      POSTGRES_DB: togglemesh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: togglemesh-dev-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

