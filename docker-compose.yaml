services:
  db:
    image: postgres:latest
    container_name: togglemesh-db
    environment:
      POSTGRES_DB: togglemesh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: togglemesh-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: