<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToggleMesh Real-Time Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }
        .pulse-light {
            animation: pulse-slow 2s infinite ease-in-out;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #3f3f46 transparent;
        }

        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        *::-webkit-scrollbar-track {
            background: transparent;
        }

        *::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 9999px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen flex items-center justify-center p-4 antialiased font-sans">

<div class="w-full max-w-md bg-zinc-950 border border-zinc-800/80 rounded-xl p-6 shadow-2xl space-y-3">
    <div class="flex items-center justify-between border-b border-zinc-800/80 pb-4">
        <div class="flex items-center gap-2">
            <span class="font-bold tracking-tight text-emerald-500">ToggleMesh</span>
            <span class="text-[9px] uppercase font-mono px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/10">HTML SDK Demo</span>
        </div>
        <span id="connection-status" class="text-[10px] font-mono text-zinc-500 flex items-center gap-1.5">
                <span class="h-1.5 w-1.5 rounded-full bg-zinc-600"></span> Disconnected
            </span>
    </div>

    <div class="space-y-1 bg-zinc-900/40 border border-zinc-800/40 p-4 rounded-lg">
        <div class="text-[10px] uppercase font-semibold text-zinc-500 tracking-wider">
            User Identity
        </div>

        <input
                id="user-identity"
                value="user_123"
                class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm font-mono text-zinc-200 outline-none"
        />
    </div>

    <div class="space-y-1 bg-zinc-900/40 border border-zinc-800/40 p-4 rounded-lg">
        <div class="text-[10px] uppercase font-semibold text-zinc-500 tracking-wider">
            User Context
        </div>

        <div class="flex justify-between gap-3">
            <span class="text-zinc-500">Country</span>
            <input
                    id="country"
                    value="US"
                    class="h-7 w-24 bg-zinc-950 border border-zinc-800 rounded px-2 text-xs text-zinc-200 outline-none text-right"
            />
        </div>

        <div class="flex justify-between gap-3">
            <span class="text-zinc-500">Plan</span>
            <input
                    id="plan"
                    value="Pro"
                    class="h-7 w-24 bg-zinc-950 border border-zinc-800 rounded px-2 text-xs text-zinc-200 outline-none text-right"
            />
        </div>
    </div>

    <button
            id="apply-identity"
            class="w-full mt-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-mono py-2 rounded hover:bg-emerald-500/20 transition"
    >
        Apply identity
    </button>

    <div class="flex flex-col items-center justify-center py-6 border border-zinc-800/40 rounded-lg bg-zinc-900/10 space-y-3">
        <div class="text-xs text-muted-foreground text-zinc-400 font-mono">Current Flag: <span class="text-primary font-bold text-zinc-200">new-checkout-flow</span></div>

        <div id="flag-bulb" class="h-20 w-20 rounded-full bg-zinc-800 border-2 border-zinc-700 flex items-center justify-center transition-all duration-300 shadow-[0_0_20px_rgba(39,39,42,0.2)]">
            <svg id="bulb-icon" class="h-10 w-10 text-zinc-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 .364l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
            </svg>
        </div>

        <div id="flag-status" class="text-sm font-bold text-zinc-400 uppercase tracking-wide">STATUS: OFF</div>
    </div>

    <div class="space-y-1">
        <div class="text-[10px] uppercase font-semibold text-zinc-500 tracking-wider">Live SDK Activity Logs</div>
        <div id="console-logs" class="h-32 bg-zinc-900/50 border border-zinc-800/80 rounded-lg p-3 font-mono text-[10px] overflow-y-auto space-y-1.5 text-zinc-400 scrollbar-thin">
            <div class="text-zinc-600">[System] Initializing SDK...</div>
        </div>
    </div>
</div>

<script type="module">
    import { ToggleMeshClient } from 'https://esm.sh/togglemesh-js@0.1.0';

    const logsContainer = document.getElementById('console-logs');
    const flagBulb = document.getElementById('flag-bulb');
    const flagStatus = document.getElementById('flag-status');
    const bulbIcon = document.getElementById('bulb-icon');
    const connectionStatus = document.getElementById('connection-status');
    const applyBtn = document.getElementById('apply-identity');
    const userIdentityInput = document.getElementById('user-identity');
    const countryInput = document.getElementById('country');
    const planInput = document.getElementById('plan');

    function log(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        let color = 'text-zinc-400';
        if (type === 'success') color = 'text-emerald-400';
        if (type === 'warning') color = 'text-amber-500';
        if (type === 'error') color = 'text-rose-500';

        logsContainer.innerHTML += `<div class="${color}">[${time}] ${message}</div>`;
        logsContainer.scrollTop = logsContainer.scrollHeight;
    }

    const client = new ToggleMeshClient({
        baseUrl: 'http://localhost:5264',
        clientKey: 'tm_client_IKDPqZdiPsU44xEL2WyLla2fTSCTN8HS0WO0sVRKgY',
        refreshInterval: 5
    });

    log("SDK initialized. Polling interval: 5 seconds.");

    client.subscribe((flags) => {
        const isEnabled = client.isEnabled('new-checkout-flow', false);

        log(`Sync completed. 'new-checkout-flow' is ${isEnabled ? 'ON' : 'OFF'}`, isEnabled ? 'success' : 'warning');

        if (isEnabled) {
            flagBulb.className = "h-20 w-20 rounded-full bg-emerald-500/10 border-2 border-emerald-500 flex items-center justify-center transition-all duration-300 shadow-[0_0_25px_rgba(16,185,129,0.3)] pulse-light";
            bulbIcon.setAttribute(
                "class",
                "h-10 w-10 text-emerald-400 transition-colors"
            );
            flagStatus.innerText = "STATUS: ON";
            flagStatus.className = "text-sm font-bold text-emerald-400 uppercase tracking-wide";
        } else {
            flagBulb.className = "h-20 w-20 rounded-full bg-zinc-900/60 border-2 border-zinc-800 flex items-center justify-center transition-all duration-300 shadow-inner";
            bulbIcon.setAttribute(
                "class",
                "h-10 w-10 text-zinc-600 transition-colors"
            );
            flagStatus.innerText = "STATUS: OFF";
            flagStatus.className = "text-sm font-bold text-zinc-400 uppercase tracking-wide";
        }
    });

    log("Identifying user 'user_123'...");
    connectionStatus.innerHTML = '<span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Polling Active';

    await client.identify('user_123', { Country: 'US', Plan: 'Pro' });
    applyBtn.addEventListener('click', async () => {
        await client.identify(userIdentityInput.value, { Country: countryInput.value, Plan: planInput.value });
    });
</script>
</body>
</html>
